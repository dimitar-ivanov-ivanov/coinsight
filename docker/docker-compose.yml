name: coinsight

services:
  # ========================================
  # COMBINED BROKER + CONTROLLER NODES (3 nodes)
  # Each node participates in the Raft metadata quorum (controller role)
  # AND serves message traffic (broker role).
  # 3 nodes is the minimum for the Raft quorum to tolerate 1 node failure
  # ========================================

  broker1:
    image: apache/kafka:4.0.0
    hostname: broker1
    container_name: broker1
    user: "0:0" # tells Docker to run as root inside the container, needed for writing to mounted volumes
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:29093,2@broker2:29093,3@broker3:29093
      KAFKA_LISTENERS: PLAINTEXT://broker1:19092,CONTROLLER://broker1:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker1:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - broker1-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server broker1:19092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  broker2:
    image: apache/kafka:4.0.0
    hostname: broker2
    container_name: broker2
    user: "0:0" # tells Docker to run as root inside the container, needed for writing to mounted volumes
    depends_on:
      - broker1
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:29093,2@broker2:29093,3@broker3:29093
      KAFKA_LISTENERS: PLAINTEXT://broker2:19093,CONTROLLER://broker2:29093,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker2:19093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - broker2-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server broker2:19093 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  broker3:
    image: apache/kafka:4.0.0
    hostname: broker3
    container_name: broker3
    user: "0:0" # tells Docker to run as root inside the container, needed for writing to mounted volumes
    depends_on:
      - broker1
      - broker2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:29093,2@broker2:29093,3@broker3:29093
      KAFKA_LISTENERS: PLAINTEXT://broker3:19094,CONTROLLER://broker3:29093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker3:19094,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - broker3-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server broker3:19094 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # KAFBAT UI for easier management
  # ========================================

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    depends_on:
      - broker1
      - broker2
      - broker3
    ports:
      - "18080:18080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker1:19092,broker2:19093,broker3:19094
      KAFKA_CLUSTERS_0_READONLY: false
      SERVER_PORT: 18080
    networks:
      - kafka-network

  # ========================================
  # MONITORING STACK: monitor-topic (Kafka) -> Vector -> Loki <- Grafana
  # Vector consumes monitor-topic directly
  # decodes the MonitorEvent protobuf using the compiled descriptor set
  # generated by the Gradle build (see build.gradle), reshapes it, and ships
  # it to Loki. Grafana queries Loki for dashboards/alerts.
  # ========================================

  vector:
    image: timberio/vector:0.46.1-debian
    container_name: vector
    restart: unless-stopped
    depends_on:
      - broker1
      - broker2
      - broker3
      - loki
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
    command: ["--config", "/etc/vector/vector.yaml"]
    networks:
      - kafka-network
      - monitoring-network

  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - loki
    networks:
      - monitoring-network

  redis:
    image: redis:7-alpine
    container_name: redis
    # Restarts the container if the Redis process crashes or exits
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    ## Enable Redis Append Only File for data durability
    command: redis-server --appendonly yes
    # Typical healtcheck - useful for monitoring tools and orchestrators to detect issues
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - redis-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    ports:
      - "5547:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - redis-network

volumes:
  broker1-data:
  broker2-data:
  broker3-data:
  loki_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local

networks:
  kafka-network:
    driver: bridge
  monitoring-network:
    driver: bridge
  redis-network:
    driver: bridge
