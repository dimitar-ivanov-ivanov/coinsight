# Vector pipeline: monitor-topic (Kafka) -> Loki
#
# Modules publish MonitorEvent/DltEvent as plain JSON (Spring Kafka's JsonSerializer,
# see coinsight.arbitrage.shared.model) - no protobuf, no compiled descriptor set to
# generate or keep in sync. Vector's built-in json codec decodes it directly.
#
# NOTE: the source object's field names below are whatever Jackson's default naming
# produces for the Java record fields (camelCase: messageId, serviceName, instanceId,
# traceId), NOT snake_case - that only mattered when this went through protobuf's JSON
# mapping. The output key names on the left (message_id, service_name, ...) are just
# this transform's own choice of shape and unrelated to the source casing.

sources:
  monitor_events:
    type: kafka
    bootstrap_servers: "broker1:19092,broker2:19093,broker3:19094"
    group_id: "vector-monitor-consumer"
    topics: ["monitor-topic"]
    decoding:
      codec: json

transforms:
  # Reshape the decoded MonitorEvent into the fields Loki should index as labels
  # (service_name, level, environment) vs. everything else, which stays as part
  # of the log line and is only searchable via LogQL at query time.
  reshape_monitor_events:
    type: remap
    inputs: ["monitor_events"]
    source: |
      . = {
        "message": .message,
        "timestamp": .timestamp,
        "message_id": .messageId,
        "level": .level,
        "service_name": .serviceName,
        "instance_id": .instanceId,
        "trace_id": .traceId,
        "host": .host,
        "environment": .environment,
        "metadata": .metadata
      }

sinks:
  loki:
    type: loki
    inputs: ["reshape_monitor_events"]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    out_of_order_action: accept
    # Keep the label set small - Loki indexes labels, everything else in the
    # log line is parsed at query time via LogQL. High-cardinality fields like
    # message_id or trace_id must NOT become labels.
    labels:
      service_name: "{{ service_name }}"
      level: "{{ level }}"
      environment: "{{ environment }}"
