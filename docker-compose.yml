version: '3.8'

services:
  # ========================================
  # DEDICATED CONTROLLER NODES (3 nodes)
  # These handle cluster coordination only
  # ========================================

  controller-1:
    image: apache/kafka:4.0.0
    hostname: controller-1
    container_name: coinsight-controller-1
    user: "0:0" # tells Docker to run as root inside the container, need for writing to mounted volumes
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://controller-1:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - controller1-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network

  controller-2:
    image: apache/kafka:4.0.0
    hostname: controller-2
    container_name: coinsight-controller-2
    user: "0:0" # tells Docker to run as root inside the container, need for writing to mounted volumes
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://controller-2:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - controller2-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network

  controller-3:
    image: apache/kafka:4.0.0
    hostname: controller-3
    container_name: coinsight-controller-3
    user: "0:0" # tells Docker to run as root inside the container, need for writing to mounted volumes
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://controller-3:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - controller3-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network

  # ========================================
  # REGULAR BROKER NODES (2 nodes)
  # These handle message traffic only
  # ========================================

  broker-1:
    image: apache/kafka:4.0.0
    hostname: broker-1
    container_name: coinsight-broker-1
    user: "0:0" # tells Docker to run as root inside the container, need for writing to mounted volumes
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - broker1-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server broker-1:19092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  broker-2:
    image: apache/kafka:4.0.0
    hostname: broker-2
    container_name: coinsight-broker-2
    user: "0:0" # tells Docker to run as root inside the container, need for writing to mounted volumes
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENERS: PLAINTEXT://broker-2:19093,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-2:19093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - broker2-data:/tmp/kraft-combined-logs
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server broker-2:19093 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================
  # KAFBAT UI for easier management
  # ========================================

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: coinsight-kafbat-ui
    depends_on:
      - broker-1
      - broker-2
    ports:
      - "18080:18080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker-1:19092,broker-2:19093
      KAFKA_CLUSTERS_0_READONLY: false
      SERVER_PORT: 18080
    networks:
      - kafka-network

  redis:
    image: redis:7-alpine
    container_name: redis
    # Restarts the container if the Redis process crashes or exits
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    ## Enable Redis Append Only File for data durability
    command: redis-server --appendonly yes
    # Typical healtcheck - useful for monitoring tools and orchestrators to detect issues
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - redis-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - redis-network

volumes:
  controller1-data:
  controller2-data:
  controller3-data:
  broker1-data:
  broker2-data:
  redis_data:
    driver: local
  redisinsight_data:
    driver: local

networks:
  kafka-network:
    driver: bridge
  redis-network:
    driver: bridge