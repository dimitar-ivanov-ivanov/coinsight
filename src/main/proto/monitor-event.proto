syntax = "proto3";

package monitor;

message MonitorEvent {
  string message = 1;
  string timestamp = 2;        // ISO8601 format
  string message_id = 3;       // Unique identifier (UUID)

  string level = 4;            // e.g., "INFO", "ERROR", "WARN", "DEBUG"
  string service_name = 5;     // e.g., "ingestor"
  string instance_id = 6;      // Unique per service instance
  string trace_id = 7;         // For tracing (OpenTelemetry/Jaeger)
  map<string, string> metadata = 8; // Arbitrary key-value metadata (tags)
  string host = 9;            // Hostname or IP of the emitting service
  string environment = 10;     // e.g., "prod", "dev", "staging"
}
